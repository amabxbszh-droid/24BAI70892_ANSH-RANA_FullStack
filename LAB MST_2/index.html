<!DOCTYPE html>
<html>
<head>
<title>Dynamic List</title>

<style>

body{
font-family: Arial;
background: linear-gradient(120deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
width:400px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:80%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
margin:10px 5px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.add{
background:#28a745;
}

.remove{
background:#dc3545;
}

ul{
margin-top:20px;
text-align:left;
}

li{
background:#f3f3f3;
padding:8px;
margin-top:5px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h2>Dynamic List</h2>

<input type="text" id="itemInput" placeholder="Enter item">

<br>

<button class="add" onclick="addItem()">Add Item</button>

<button class="remove" onclick="removeItem()">Remove Last Item</button>

<ul id="list"></ul>

</div>

<script>

function addItem(){

let input=document.getElementById("itemInput");
let value=input.value;

if(value==="") return;

let li=document.createElement("li");
li.textContent=value;

document.getElementById("list").appendChild(li);

input.value="";

}

function removeItem(){

let list=document.getElementById("list");

if(list.lastChild){
list.removeChild(list.lastChild);
}

}

</script>

</body>
</html>
