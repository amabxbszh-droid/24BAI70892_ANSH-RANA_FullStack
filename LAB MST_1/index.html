<!DOCTYPE html>
<html>
<head>
<title>Post Form</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
width:350px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#4facfe;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0099ff;
}

#message{
text-align:center;
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Create Post</h2>

<form id="postForm">

<input type="text" id="title" placeholder="Enter Title" required>

<textarea id="body" placeholder="Enter Body" required></textarea>

<button type="submit">Submit</button>

</form>

<p id="message"></p>

</div>

<script>

document.getElementById("postForm").addEventListener("submit", function(e){

e.preventDefault();

let title = document.getElementById("title").value;
let body = document.getElementById("body").value;

document.getElementById("message").innerText="Submitting...";

fetch("https://jsonplaceholder.typicode.com/posts",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
title:title,
body:body
})
})

.then(response => response.json())

.then(data=>{
document.getElementById("message").style.color="green";
document.getElementById("message").innerText="✅ Post submitted successfully!";
document.getElementById("postForm").reset();
})

.catch(error=>{
document.getElementById("message").style.color="red";
document.getElementById("message").innerText="❌ Error submitting post";
});

});

</script>

</body>
</html>
